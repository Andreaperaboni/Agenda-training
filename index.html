<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Maratona 26">
<title>Maratona Oct 2026</title>
<style>
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#e8e8e6;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#9a9a9a;
  --bd:rgba(0,0,0,0.1);--bd2:rgba(0,0,0,0.2);
  --green:#0F6E56;--gbg:#E1F5EE;
  --amber:#7a5000;--abg:#FFF3D0;
  --red:#A32D2D;--rbg:#FCEBEB;
  --blue:#185FA5;--bbg:#E6F1FB;
  --coral:#712B13;--cbg:#FAECE7;
  --purple:#3C3489;--pbg:#EEEDFE;
  --gray:#444441;--ggbg:#F1EFE8;
  --r:12px;--rs:8px;--rp:20px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
  --bd:rgba(255,255,255,0.1);--bd2:rgba(255,255,255,0.22);
  --green:#34c88a;--gbg:#083d28;
  --amber:#f4b942;--abg:#3d2c00;
  --red:#ff6b6b;--rbg:#3d1010;
  --blue:#6aadee;--bbg:#0c2d52;
  --coral:#f0997b;--cbg:#3d1a08;
  --purple:#b8b2f0;--pbg:#1e1c3d;
  --gray:#c0bdb4;--ggbg:#2c2c2a;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px}
.top-tabs{display:flex;background:var(--bg);border-bottom:0.5px solid var(--bd);position:fixed;top:0;left:0;right:0;z-index:50;padding-top:env(safe-area-inset-top)}
.ttab{flex:1;padding:13px 8px 11px;border:none;background:transparent;font-family:inherit;font-size:14px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2.5px solid transparent}
.ttab.active{color:var(--green);border-bottom-color:var(--green)}
.page{display:none;position:fixed;top:calc(46px + env(safe-area-inset-top));bottom:0;left:0;right:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 13px calc(24px + env(safe-area-inset-bottom))}
.page.active{display:block}
.wbar{display:flex;align-items:center;gap:8px;background:var(--bg2);border-radius:var(--r);padding:10px 13px;margin-bottom:13px}
.wbar-info{flex:1}
.wbar-title{font-size:14px;font-weight:600}
.wbar-sub{font-size:11px;color:var(--text3);margin-top:2px}
.wbtns{display:flex;gap:6px}
.wbtn{width:34px;height:34px;border-radius:var(--rs);border:0.5px solid var(--bd2);background:var(--bg);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.wbtn:active{background:var(--bg3)}
.wbtn:disabled{opacity:.28;cursor:default}
.phase-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:var(--rp);margin-bottom:10px}
.ph-raccordo{background:var(--abg);color:var(--amber)}
.ph-piano{background:var(--gbg);color:var(--green)}
.dstrip{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.dstrip::-webkit-scrollbar{display:none}
.dchip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:7px 8px 6px;border-radius:var(--r);border:0.5px solid var(--bd);font-family:inherit;cursor:pointer;background:var(--bg);min-width:50px;gap:2px}
.dchip .dd{font-size:12px;font-weight:700;color:var(--text2)}
.dchip .dm{font-size:10px;color:var(--text3)}
.dchip .dot{width:5px;height:5px;border-radius:50%;background:var(--bd2);margin-top:2px}
.dchip.istoday{border-color:var(--green);background:var(--gbg)}
.dchip.istoday .dd,.dchip.istoday .dm{color:var(--green)}
.dchip.istoday .dot{background:var(--green)}
.dchip.sel.t-rip{background:var(--ggbg);border-color:var(--gray)}.dchip.sel.t-rip .dd,.dchip.sel.t-rip .dm{color:var(--gray)}
.dchip.sel.t-len{background:var(--bbg);border-color:var(--blue)}.dchip.sel.t-len .dd,.dchip.sel.t-len .dm{color:var(--blue)}
.dchip.sel.t-len2{background:var(--bbg);border-color:var(--blue)}.dchip.sel.t-len2 .dd,.dchip.sel.t-len2 .dm{color:var(--blue)}
.dchip.sel.t-qua{background:var(--cbg);border-color:var(--coral)}.dchip.sel.t-qua .dd,.dchip.sel.t-qua .dm{color:var(--coral)}
.dchip.sel.t-pre{background:var(--abg);border-color:var(--amber)}.dchip.sel.t-pre .dd,.dchip.sel.t-pre .dm{color:var(--amber)}
.dchip.sel.t-lun{background:var(--pbg);border-color:var(--purple)}.dchip.sel.t-lun .dd,.dchip.sel.t-lun .dm{color:var(--purple)}
.dchip.sel.t-gara{background:var(--gbg);border-color:var(--green)}.dchip.sel.t-gara .dd,.dchip.sel.t-gara .dm{color:var(--green)}
.dpanel{display:none}.dpanel.active{display:block}
.tcard{border-radius:var(--r);padding:14px;margin-bottom:10px;border:0.5px solid var(--bd)}
.tcard.t-rip{background:var(--ggbg)}.tcard.t-len{background:var(--bbg)}.tcard.t-len2{background:var(--bbg)}.tcard.t-qua{background:var(--cbg)}
.tcard.t-pre{background:var(--abg)}.tcard.t-lun{background:var(--pbg)}.tcard.t-gara{background:var(--gbg)}
.t-over{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;opacity:.6;margin-bottom:4px}
.t-title{font-size:17px;font-weight:700;margin-bottom:8px;line-height:1.2}
.t-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.t-pill{font-size:11px;padding:3px 9px;border-radius:var(--rp);background:rgba(0,0,0,0.08);font-weight:600}
@media(prefers-color-scheme:dark){.t-pill{background:rgba(255,255,255,0.13)}}
.t-sessions{display:flex;flex-direction:column;gap:7px}
.t-sess{background:rgba(255,255,255,0.6);border-radius:var(--rs);padding:9px 11px}
@media(prefers-color-scheme:dark){.t-sess{background:rgba(0,0,0,0.28)}}
.t-sess-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;opacity:.55;margin-bottom:3px}
.t-sess-txt{font-size:13px;line-height:1.65}
.t-note{font-size:12px;margin-top:9px;padding:7px 10px;border-radius:var(--rs);background:rgba(0,0,0,0.06);line-height:1.5;font-style:italic}
@media(prefers-color-scheme:dark){.t-note{background:rgba(255,255,255,0.07)}}
.sec-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin:14px 0 8px}
.mcard{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--r);margin-bottom:7px;overflow:hidden}
.mhdr{display:flex;align-items:center;gap:8px;padding:11px 13px;cursor:pointer}
.mhdr:active{background:var(--bg2)}
.mname{font-size:12px;font-weight:700;min-width:72px;color:var(--text2)}
.mprev{font-size:13px;color:var(--text);flex:1;line-height:1.3}
.mbadge{font-size:10px;padding:2px 7px;border-radius:var(--rp);flex-shrink:0;font-weight:600}
.mb-c{background:var(--pbg);color:var(--purple)}.mb-p{background:var(--gbg);color:var(--green)}
.mb-pr{background:var(--cbg);color:var(--coral)}.mb-l{background:var(--gbg);color:var(--green)}
.chev{font-size:10px;color:var(--text3);transition:transform .18s;flex-shrink:0}
.chev.open{transform:rotate(90deg)}
.mbody{display:none;padding:2px 13px 11px}.mbody.open{display:block}
.timing{font-size:11px;padding:5px 8px;border-radius:var(--rs);background:var(--abg);color:var(--amber);margin-bottom:7px;font-weight:500}
.fr{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:0.5px solid var(--bd);font-size:13px}
.fr:last-child{border-bottom:none}
.fn{color:var(--text);flex:1;line-height:1.4}.fq{color:var(--text2);font-size:12px;margin-left:6px;white-space:nowrap}
.falt{font-size:11px;color:var(--text3);padding:1px 0 3px 8px;font-style:italic;line-height:1.4}
.scat{margin-bottom:15px}
.scattitle{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);padding:4px 0 6px;border-bottom:0.5px solid var(--bd);margin-bottom:2px}
.srow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--bd)}
.srow:last-child{border-bottom:none}
.sinfo{flex:1;min-width:0}
.sname{font-size:13px;color:var(--text);line-height:1.3}
.sweek{font-size:11px;color:var(--text3);margin-top:1px}
.sright{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.sval{font-size:13px;font-weight:700;white-space:nowrap}
.ok{color:var(--green)}.warn{color:var(--amber)}.empty{color:var(--red)}
.addbtn{font-size:12px;padding:5px 12px;border-radius:var(--rp);border:0.5px solid var(--bd2);background:var(--bg);color:var(--text);cursor:pointer;font-family:inherit}
.addbtn:active{background:var(--bg2)}
.mov{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end}
.mov.hidden{display:none}
.mbox{background:var(--bg);border-radius:var(--r) var(--r) 0 0;padding:20px 18px calc(30px + env(safe-area-inset-bottom));width:100%}
.mtit{font-size:16px;font-weight:700;margin-bottom:3px}
.msub{font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.5;white-space:pre-line}
.mrow{display:flex;gap:10px;align-items:center;margin-bottom:16px}
.minp{flex:1;font-size:18px;padding:11px 13px;border:0.5px solid var(--bd2);border-radius:var(--rs);background:var(--bg);color:var(--text);font-family:inherit}
.munit{font-size:14px;color:var(--text2);min-width:32px}
.macts{display:flex;gap:10px}
.macts button{flex:1;padding:13px;border-radius:var(--rs);font-size:15px;font-family:inherit;cursor:pointer;border:none;font-weight:600}
.mok{background:var(--green);color:#fff}.mok:active{opacity:.85}
.mno{background:var(--bg2);color:var(--text)}.mno:active{background:var(--bg3)}
.mres{text-align:center;margin-top:14px}
.mres span{font-size:13px;color:var(--red);cursor:pointer}
</style>
</head>
<body>
<div class="top-tabs">
  <button class="ttab active" onclick="showPage('agenda',this)">📅 Agenda</button>
  <button class="ttab" onclick="showPage('scorte',this)">🛒 Scorte</button>
</div>
<div id="pg-agenda" class="page active">
  <div class="wbar">
    <div class="wbar-info">
      <div class="wbar-title" id="aWeekTitle"></div>
      <div class="wbar-sub" id="aWeekSub"></div>
    </div>
    <div class="wbtns">
      <button class="wbtn" id="btnPrev" onclick="changeAWeek(-1)">‹</button>
      <button class="wbtn" id="btnNext" onclick="changeAWeek(1)">›</button>
    </div>
  </div>
  <div class="dstrip" id="dstrip"></div>
  <div id="dpanels"></div>
</div>
<div id="pg-scorte" class="page">
  <div class="wbar">
    <div class="wbar-info">
      <div class="wbar-title" id="sWeekTitle">Settimana attuale</div>
      <div class="wbar-sub" id="sWeekSub"></div>
    </div>
    <div class="wbtns">
      <button class="wbtn" onclick="changeSWeek(-1)">‹</button>
      <button class="wbtn" onclick="changeSWeek(1)">›</button>
    </div>
  </div>
  <div id="stockEl"></div>
</div>
<div class="mov hidden" id="mov">
  <div class="mbox">
    <div class="mtit" id="mtit"></div>
    <div class="msub" id="msub"></div>
    <div class="mrow"><input class="minp" type="number" id="minp" min="0" step="1" inputmode="decimal" placeholder="0"><span class="munit" id="munit"></span></div>
    <div class="macts"><button class="mno" onclick="closeM()">Annulla</button><button class="mok" onclick="confirmM()">Aggiungi</button></div>
    <div class="mres"><span onclick="resetM()">Azzera scorta</span></div>
  </div>
</div>
<script>
const MESI=['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
const GIORNI=['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
function addD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function fmtShort(d){return d.getDate()+' '+MESI[d.getMonth()]}
function fmtFull(d){return GIORNI[(d.getDay()+6)%7]+' '+d.getDate()+' '+MESI[d.getMonth()]}
function sameDay(a,b){return a.getDate()===b.getDate()&&a.getMonth()===b.getMonth()&&a.getFullYear()===b.getFullYear()}
const PLAN_START=new Date(2026,4,19);
const TODAY=new Date();
function currentPlanWeek(){const diff=TODAY-PLAN_START;if(diff<0)return 0;return Math.min(Math.floor(diff/(7*86400000)),26)}
function todayDowIdx(){return(TODAY.getDay()+6)%7}

// ── PIANO COMPLETO 27 SETTIMANE ──────────────────────────────────────
// 4 sett raccordo (19 mag – 14 giu) + 1 sett raccordo finale (15-21 giu, come sett 6 prev.) + 18 sett GoAndRace + 1 sett extra = 23 sett totali dal 15 giu
// Struttura: W[i] = array 7 giorni lun→dom
// Ogni giorno: {type, title, km, s:[{l,t}], n, phase}
// phase: 'raccordo' | 'piano'

const W=[
// ═══════════════════════════════════════════════════════
// SETTIMANA 1 RACCORDO — 19-25 mag — ~55 km
// Schema: riposo / scarico lento / qualità leggera / lento / lento / pre-lungo / lungo 22km
// ═══════════════════════════════════════════════════════
[
 {type:'rip',title:'Riposo',km:'',phase:'raccordo',
  s:[{l:'',t:'Giornata di recupero completo.'}],n:''},
 {type:'len2',title:'Scarico — corsa lenta',km:'12 km',phase:'raccordo',
  s:[{l:'Corsa',t:'12 km corsa lenta facile a ~5\'00"/km.\nGambe sciolte, nessuno sforzo.'}],n:''},
 {type:'qua',title:'Qualità — progressione',km:'~15 km tot',phase:'raccordo',
  s:[
    {l:'Riscaldamento',t:'4 km a 5\'00"/km'},
    {l:'Progressione',t:'10 km progressivi:\n→ 3 km a 5\'00"/km (facile)\n→ 3 km a 4\'45"/km\n→ 2 km a 4\'30"/km\n→ 2 km a 4\'15"/km'},
    {l:'Defaticante',t:'1 km a 5\'30"/km'},
  ],n:'Prima settimana: qualità leggera, nessuna ripetuta. Focus sul ritmo progressivo controllato.'},
 {type:'len2',title:'Corsa lenta',km:'12 km',phase:'raccordo',
  s:[{l:'Corsa',t:'12 km a ~5\'00"/km.'}],n:''},
 {type:'len2',title:'Corsa lenta',km:'12 km',phase:'raccordo',
  s:[{l:'Corsa',t:'12 km a ~5\'00"/km.'}],n:''},
 {type:'pre',title:'Z2 pre-lungo',km:'8 km',phase:'raccordo',
  s:[{l:'Corsa',t:'8 km rigeneranti Z2 a ~5\'20"/km.'}],n:'Cena: riso basmati 160g + ragù 30g. Primo rientro sui lunghissimi: domani ritmo molto conservativo.'},
 {type:'lun',title:'Lungo 22 km',km:'22 km',phase:'raccordo',
  s:[{l:'Lungo',t:'22 km lenti a ~5\'10"/km.\nPasso conservativo. Obiettivo: abituare di nuovo muscoli e tendini alla distanza.'}],n:'Gel iso 25g al km 10 e km 18 se lo senti. Idratati bene.'},
],
// ═══════════════════════════════════════════════════════
// SETTIMANA 2 RACCORDO — 26 mag – 1 giu — ~61 km
// Schema: riposo / scarico / qualità 1000m × 8 / lento / lento / pre-lungo / lungo progressivo 25km
// ═══════════════════════════════════════════════════════
[
 {type:'rip',title:'Riposo',km:'',phase:'raccordo',
  s:[{l:'',t:'Recupero completo.'}],n:''},
 {type:'len2',title:'Scarico — corsa lenta',km:'12 km',phase:'raccordo',
  s:[{l:'Corsa',t:'12 km corsa lenta facile a ~5\'00"/km.'}],n:''},
 {type:'qua',title:'Qualità — 1000m × 8',km:'~16 km tot',phase:'raccordo',
  s:[
    {l:'Riscaldamento',t:'4 km a 5\'00"/km'},
    {l:'Ripetute',t:'1000m × 8 a 3\'55"-4\'00"/km\nrec 400m supplesse (~2\' a 5\'00"/km)'},
    {l:'Defaticante',t:'1 km a 5\'30"/km'},
  ],n:'Ritmo leggermente più conservativo dei 3\'50" del piano coach — siamo in costruzione.'},
 {type:'len2',title:'Corsa lenta',km:'13 km',phase:'raccordo',
  s:[{l:'Corsa',t:'13 km a ~5\'00"/km.'}],n:''},
 {type:'len2',title:'Corsa lenta',km:'13 km',phase:'raccordo',
  s:[{l:'Corsa',t:'13 km a ~5\'00"/km.'}],n:''},
 {type:'pre',title:'Z2 pre-lungo',km:'8 km',phase:'raccordo',
  s:[{l:'Corsa',t:'8 km Z2 a ~5\'20"/km.'}],n:'Cena: riso basmati 160g + ragù 30g.'},
 {type:'lun',title:'Lungo progressivo 25 km',km:'25 km',phase:'raccordo',
  s:[{l:'Lungo progressivo',t:'25 km con progressione:\n→ 7 km a 5\'00"/km\n→ 7 km a 4\'45"/km\n→ 7 km a 4\'30"/km\n→ 4 km a 4\'15"/km (ultimi km vivi)'}],n:'Schema fedele al piano coach (progressivo 22 km con allunghi finali). Qui allunghiamo a 25 km con la stessa logica.'},
],
// ═══════════════════════════════════════════════════════
// SETTIMANA 3 RACCORDO — 2-8 giu — ~65 km
// Schema: riposo / scarico / qualità 2000m × 4 / lento / lento / pre-lungo / lungo 27km con allunghi
// ═══════════════════════════════════════════════════════
[
 {type:'rip',title:'Riposo',km:'',phase:'raccordo',
  s:[{l:'',t:'Recupero completo.'}],n:''},
 {type:'len2',title:'Scarico — corsa lenta',km:'12 km',phase:'raccordo',
  s:[{l:'Corsa',t:'12 km corsa lenta facile a ~5\'00"/km.'}],n:''},
 {type:'qua',title:'Qualità — 2000m × 4',km:'~16 km tot',phase:'raccordo',
  s:[
    {l:'Riscaldamento',t:'4 km a 5\'00"/km'},
    {l:'Ripetute',t:'2000m × 4:\n→ giro veloce in 7\'40" (~3\'50"/km)\n→ giro lento in ~8\'00" (~4\'00"/km)\nrec 2\' fermi tra le ripetute'},
    {l:'Defaticante',t:'1 km a 5\'30"/km'},
  ],n:'Fedele allo schema coach (2000m × 5 a variazione). Qui 4 ripetute: siamo ancora in costruzione.'},
 {type:'len',title:'Corsa lenta',km:'15 km',phase:'raccordo',
  s:[{l:'Corsa',t:'15 km a ~5\'00"/km.'}],n:''},
 {type:'len2',title:'Corsa lenta',km:'13 km',phase:'raccordo',
  s:[{l:'Corsa',t:'13 km a ~5\'00"/km.'}],n:''},
 {type:'pre',title:'Z2 pre-lungo',km:'9 km',phase:'raccordo',
  s:[{l:'Corsa',t:'9 km Z2 a ~5\'20"/km.'}],n:'Cena: riso basmati 160g + ragù 30g.'},
 {type:'lun',title:'Lungo 27 km con allunghi',km:'27 km',phase:'raccordo',
  s:[{l:'Lungo con allunghi finali',t:'27 km lenti a ~5\'00"/km\n+ 5 allunghi finali di 80-100m (stacchi veloci sul rettilineo)'}],n:'Schema fedele piano coach: lungo lento + allunghi finali per tenere le gambe reattive. Non è un lungo progressivo.'},
],
// ═══════════════════════════════════════════════════════
// SETTIMANA 4 RACCORDO — 9-14 giu — ~58 km (scarico)
// Schema: riposo / scarico / qualità 800+200 × 8 / lento / pre-lungo / medio 20km
// Nota: 6 giorni invece di 7, arriviamo al 14 giu (dom = inizio sett.1 GoAndRace il 15 giu)
// ═══════════════════════════════════════════════════════
[
 {type:'rip',title:'Riposo',km:'',phase:'raccordo',
  s:[{l:'',t:'Recupero. Ultima settimana di raccordo, poi inizia il piano GoAndRace.'}],n:''},
 {type:'len2',title:'Scarico — corsa lenta',km:'12 km',phase:'raccordo',
  s:[{l:'Corsa',t:'12 km corsa lenta facile a ~5\'00"/km.'}],n:''},
 {type:'qua',title:'Qualità — 800+200 × 8',km:'~15 km tot',phase:'raccordo',
  s:[
    {l:'Riscaldamento',t:'4 km a 5\'00"/km'},
    {l:'Ripetute',t:'800m + 200m × 8:\n→ 800m in 3\'05" (~3\'50"/km)\n→ 200m in 1\'00" (rec lento)\nrec tra le serie: 2\' fermi'},
    {l:'Defaticante',t:'1 km a 5\'30"/km'},
  ],n:'Fedele al piano coach (800+200 × 10). Qui 8 ripetute: settimana di scarico, volume ridotto.'},
 {type:'len',title:'Corsa lenta',km:'15 km',phase:'raccordo',
  s:[{l:'Corsa',t:'15 km a ~5\'00"/km.'}],n:''},
 {type:'rip',title:'Riposo',km:'',phase:'raccordo',
  s:[{l:'',t:'Riposo. Prepara le gambe per il medio domenicale.'}],n:''},

// ── BUILD AGENDA ──────────────────────────────────────────────────────
function buildAgenda(){
  const strip=document.getElementById('dstrip');
  const panels=document.getElementById('dpanels');
  strip.innerHTML='';panels.innerHTML='';
  const wdata=W[aWeek];
  const wstart=addD(PLAN_START,aWeek*7);
  const wend=addD(wstart,6);
  const phase=wdata[0].phase;
  const isRaccordo=phase==='raccordo';
  const weekNum=isRaccordo?(aWeek+1):(aWeek-3);
  const weekLabel=isRaccordo?`Raccordo ${weekNum}/4`:`GoAndRace ${weekNum}/18`;
  const phaseClass=isRaccordo?'ph-raccordo':'ph-piano';
  document.getElementById('aWeekTitle').textContent=weekLabel;
  document.getElementById('aWeekSub').textContent=fmtShort(wstart)+' – '+fmtShort(wend);
  document.getElementById('btnPrev').disabled=aWeek===0;
  document.getElementById('btnNext').disabled=aWeek===TOTAL_WEEKS-1;
  const curW=currentPlanWeek();
  const defDay=(aWeek===curW)?todayDowIdx():0;

  // phase tag
  const ptag=document.createElement('div');
  ptag.className='phase-tag '+phaseClass;
  ptag.textContent=isRaccordo?'📋 Fase raccordo — costruzione graduale':'🏃 Piano GoAndRace ufficiale';
  panels.appendChild(ptag);

  wdata.forEach((day,di)=>{
    const dd=addD(wstart,di);
    const isToday=sameDay(dd,TODAY);
    const chip=document.createElement('button');
    chip.className='dchip t-'+day.type+(di===defDay?' sel':'')+(isToday?' istoday':'');
    chip.innerHTML=`<span class="dd">${GIORNI[di]}</span><span class="dm">${dd.getDate()} ${MESI[dd.getMonth()]}</span><span class="dot"></span>`;
    chip.dataset.di=di;
    chip.onclick=()=>{
      document.querySelectorAll('.dchip').forEach(c=>c.classList.remove('sel'));
      document.querySelectorAll('.dpanel').forEach(p=>p.classList.remove('active'));
      chip.classList.add('sel');
      document.getElementById('dp-'+aWeek+'-'+di).classList.add('active');
    };
    strip.appendChild(chip);

    const panel=document.createElement('div');
    panel.id='dp-'+aWeek+'-'+di;
    panel.className='dpanel'+(di===defDay?' active':'');

    // training card
    const tc=document.createElement('div');
    tc.className='tcard t-'+day.type;
    let pills='';
    if(day.km)pills+=`<span class="t-pill">${day.km}</span>`;
    const sessHtml=day.s.map(s=>`<div class="t-sess">${s.l?`<div class="t-sess-lbl">${s.l}</div>`:''}<div class="t-sess-txt">${s.t.replace(/\n/g,'<br>')}</div></div>`).join('');
    tc.innerHTML=`<div class="t-over">Allenamento — ${fmtFull(dd)}</div><div class="t-title">${day.title}</div>${pills?`<div class="t-pills">${pills}</div>`:''}<div class="t-sessions">${sessHtml}</div>${day.n?`<div class="t-note">📝 ${day.n}</div>`:''}`;
    panel.appendChild(tc);

    // meals
    const typeToMeal={rip:'rip',len2:'len2_mar',qua:'qua',len:'len',pre:'pre',lun:'lun',gara:'gara'};
    // Giovedì (di=3) usa len2_gio
    const mealKey=(di===3&&day.type==='len2')?'len2_gio':(typeToMeal[day.type]||'rip');
    const meals=MP[mealKey]||MP['rip'];
    const sl=document.createElement('div');sl.className='sec-lbl';sl.textContent='Pasti del giorno';
    panel.appendChild(sl);
    meals.forEach(m=>{
      const mc=document.createElement('div');mc.className='mcard';
      const bc=BGCLS[m.bg]||'';const bl=BGLBL[m.bg]||'';
      const hdr=document.createElement('div');hdr.className='mhdr';
      hdr.innerHTML=`<span class="chev">▶</span><span class="mname">${m.nm}</span><span class="mprev">${m.pr}</span>${bc?`<span class="mbadge ${bc}">${bl}</span>`:''}`;
      const body=document.createElement('div');body.className='mbody';
      if(m.tm){const t=document.createElement('div');t.className='timing';t.textContent='⏱ '+m.tm;body.appendChild(t);}
      m.fs.forEach(f=>{
        const r=document.createElement('div');r.className='fr';
        r.innerHTML=`<span class="fn">${f.n}</span><span class="fq">${f.q}</span>`;
        body.appendChild(r);
        if(f.a){const alt=document.createElement('div');alt.className='falt';alt.textContent='Alt: '+f.a;body.appendChild(alt);}
      });
      hdr.onclick=()=>{const o=body.classList.toggle('open');hdr.querySelector('.chev').classList.toggle('open',o);};
      mc.appendChild(hdr);mc.appendChild(body);panel.appendChild(mc);
    });
    panels.appendChild(panel);
  });
  setTimeout(()=>{const ac=strip.querySelector('.sel');if(ac)ac.scrollIntoView({inline:'center',block:'nearest'});},50);
}

function changeAWeek(d){aWeek=Math.max(0,Math.min(TOTAL_WEEKS-1,aWeek+d));buildAgenda();}

// ── BUILD SCORTE ──────────────────────────────────────────────────────
function renderStock(){
  const labels=['Settimana attuale','Fra 1 settimana','Fra 2 settimane','Fra 3 settimane','Fra 4 settimane'];
  document.getElementById('sWeekTitle').textContent=labels[sOff];
  const tw=currentPlanWeek()+sOff;
  const ws=addD(PLAN_START,tw*7);
  document.getElementById('sWeekSub').textContent=tw<TOTAL_WEEKS?fmtShort(ws)+' – '+fmtShort(addD(ws,6)):'Dopo la gara';
  const el=document.getElementById('stockEl');el.innerHTML='';
  CATS.forEach(cat=>{
    const items=ITEMS.filter(i=>i.cat===cat);if(!items.length)return;
    const sec=document.createElement('div');sec.className='scat';
    const tit=document.createElement('div');tit.className='scattitle';tit.textContent=cat;sec.appendChild(tit);
    items.forEach(item=>{
      const s=stk[item.id]||0;
      const res=Math.max(0,s-item.week*sOff);
      const wl=item.week>0?s/item.week:99;
      let cls,txt;
      if(sOff===0){
        cls=wl<1?'empty':wl<2?'warn':'ok';
        txt=s>0?`${s} ${item.unit} (${wl>=99?'∞':wl.toFixed(1)} sett.)`:'0 — da acquistare';
      }else{
        if(res<=0){cls='empty';txt='Esaurito';}
        else if(res<item.week){cls='warn';txt=`${res} ${item.unit} rimasti`;}
        else{cls='ok';txt=`${res} ${item.unit} rimasti`;}
      }
      const row=document.createElement('div');row.className='srow';
      row.innerHTML=`<div class="sinfo"><div class="sname">${item.name}</div><div class="sweek">${item.week} ${item.unit}/sett.</div></div><div class="sright"><span class="sval ${cls}">${txt}</span><button class="addbtn" onclick="openM('${item.id}')">+ Aggiungi</button></div>`;
      sec.appendChild(row);
    });
    el.appendChild(sec);
  });
}
function changeSWeek(d){sOff=Math.max(0,Math.min(4,sOff+d));renderStock();}

// ── MODAL ────────────────────────────────────────────────────────────
function openM(id){
  mId=id;const item=ITEMS.find(i=>i.id===id);const cur=stk[id]||0;
  document.getElementById('mtit').textContent=item.name;
  document.getElementById('msub').textContent=`Scorta attuale: ${cur} ${item.unit}\nConsumo settimanale: ${item.week} ${item.unit}`;
  document.getElementById('munit').textContent=item.unit;
  document.getElementById('minp').value='';
  document.getElementById('mov').classList.remove('hidden');
  setTimeout(()=>document.getElementById('minp').focus(),150);
}
function closeM(){document.getElementById('mov').classList.add('hidden');mId=null;}
function confirmM(){
  const v=parseFloat(document.getElementById('minp').value)||0;
  if(v>0){stk[mId]=(stk[mId]||0)+v;saveStk(stk);}
  closeM();renderStock();
}
function resetM(){if(!mId)return;stk[mId]=0;saveStk(stk);closeM();renderStock();}
document.getElementById('mov').addEventListener('click',function(e){if(e.target===this)closeM();});
document.getElementById('minp').addEventListener('keydown',e=>{if(e.key==='Enter')confirmM();});

// ── NAV ──────────────────────────────────────────────────────────────
function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.ttab').forEach(b=>b.classList.remove('active'));
  document.getElementById('pg-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='scorte')renderStock();
}

buildAgenda();renderStock();
</script>
</body>
</html>
